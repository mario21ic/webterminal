services:
  webterminal:
    build: .
    image: mario21ic/webterminal:latest
    platform: linux/amd64
    container_name: webterminal
    volumes:
      # Dev
      - ./server.js:/app/server.js:ro
      - ./public:/app/public
      # Docker
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Data
      - webterminal_data:/app/data
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - SHELL=/bin/bash
      - SESSION_SECRET=change-me-in-production
      - ADMIN_USER=admin:changeme
    restart: unless-stopped

volumes:
  webterminal_data:
